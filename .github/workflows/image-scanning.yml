name: Container Image Scanning

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  scan-and-sign:
    name: Build, Scan, and Sign Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build an image from Dockerfile
        run: |
          docker build -f backend/Dockerfile -t inheritx/backend:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'inheritx/backend:${{ github.sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'



      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign the images with Cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          echo "Image signing step. In a real environment with a registry:"
          echo "cosign sign --yes registry.example.com/inheritx/backend:${{ github.sha }}"
